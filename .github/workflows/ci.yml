name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.compiler.name }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { name: GCC,   cc: gcc,   cxx: g++ }
          - { name: Clang, cc: clang, cxx: clang++ }
    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: mise run deps

      - name: Build
        run: mise run build

  test:
    name: Test (${{ matrix.compiler.name }})
    runs-on: ubuntu-22.04
    needs: build
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { name: GCC,   cc: gcc,   cxx: g++ }
          - { name: Clang, cc: clang, cxx: clang++ }
    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: mise run deps

      - name: Build
        run: mise run build

      - name: Test
        run: mise run test

  sanitize:
    name: Sanitize
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: mise run deps

      - name: Test with sanitizers
        run: mise run test:sanitize

  format:
    name: Format
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Check formatting
        run: mise run format:check

  ascii-check:
    name: ASCII Check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Check for non-ASCII characters
        run: mise run ascii-check

  lint:
    name: Lint
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: mise run deps

      - name: Build
        run: mise run build

      - name: Lint
        run: mise run lint

  spell:
    name: Spell Check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Check spelling
        run: mise run spell

  coverage:
    name: Coverage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: mise run deps

      - name: Run coverage
        run: mise run test:coverage

  cppcheck:
    name: Cppcheck
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install cppcheck
        run: sudo apt-get install -y -q cppcheck

      - name: Run cppcheck
        run: mise run cppcheck

  codeql:
    name: CodeQL
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: mise run deps

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp

      - name: Build
        run: mise run build

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  todo:
    name: TODO to Issue
    runs-on: ubuntu-22.04
    if: github.event_name == 'push'
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create issues from TODOs
        uses: alstr/todo-to-issue-action@v5

  links:
    name: Link Check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Check links
        run: mise run links

  latex:
    name: Build LaTeX Report
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install tectonic
        uses: wtfjoke/setup-tectonic@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build PDF
        run: mise run report:build

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: report/report.pdf
