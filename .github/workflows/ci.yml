name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: mise run deps

      - name: Build
        run: mise run build

  test:
    name: Test
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: mise run deps

      - name: Build
        run: mise run build

      - name: Test
        run: mise run test

  format:
    name: Format
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: mise run deps

      - name: Check formatting
        run: mise run format:check

  ascii-check:
    name: ASCII Check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Check for non-ASCII characters
        run: mise run ascii-check

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: mise run deps

      - name: Build
        run: mise run build

      - name: Lint
        run: mise run lint

  spell:
    name: Spell Check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Check spelling
        run: mise run spell

  coverage:
    name: Coverage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        run: mise run deps

      - name: Run coverage
        run: mise run test:coverage

  cppcheck:
    name: Cppcheck
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install cppcheck
        run: sudo apt-get install -y -q cppcheck

      - name: Run cppcheck
        run: mise run cppcheck

  links:
    name: Link Check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Check links
        run: mise run links

  latex:
    name: Build LaTeX Report
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install tectonic
        uses: wtfjoke/setup-tectonic@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build PDF
        run: mise run report:build

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: report/report.pdf
