name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.compiler.name }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { name: GCC,   cc: gcc,   cxx: g++ }
          - { name: Clang, cc: clang, cxx: clang++ }
    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install mise
        uses: jdx/mise-action@v4.0.1

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build/
          key: cmake-${{ runner.os }}-${{ matrix.compiler.name }}-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.cu', '**/CMakeLists.txt', 'cmake/**') }}
          restore-keys: cmake-${{ runner.os }}-${{ matrix.compiler.name }}-

      - name: Install system dependencies
        run: mise run deps

      - name: Build
        run: mise run build

  test:
    name: Test (${{ matrix.compiler.name }})
    runs-on: ubuntu-22.04
    needs: [build, format, ascii-check, spell, links]
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { name: GCC,   cc: gcc,   cxx: g++ }
          - { name: Clang, cc: clang, cxx: clang++ }
    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install mise
        uses: jdx/mise-action@v4.0.1

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build/
          key: cmake-${{ runner.os }}-${{ matrix.compiler.name }}-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.cu', '**/CMakeLists.txt', 'cmake/**') }}
          restore-keys: cmake-${{ runner.os }}-${{ matrix.compiler.name }}-

      - name: Install system dependencies
        run: mise run deps

      - name: Build
        run: mise run build

      - name: Test
        run: mise run test

  sanitize:
    name: Sanitize
    runs-on: ubuntu-22.04
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install mise
        uses: jdx/mise-action@v4.0.1

      - name: Cache sanitize build
        uses: actions/cache@v4
        with:
          path: build-sanitize/
          key: cmake-sanitize-${{ runner.os }}-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.cu', '**/CMakeLists.txt', 'cmake/**') }}
          restore-keys: cmake-sanitize-${{ runner.os }}-

      - name: Install system dependencies
        run: mise run deps

      - name: Test with sanitizers
        run: mise run test:sanitize

  format:
    name: Format
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install mise
        uses: jdx/mise-action@v4.0.1

      - name: Check formatting
        run: mise run format:check

  ascii-check:
    name: ASCII Check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install mise
        uses: jdx/mise-action@v4.0.1

      - name: Check for non-ASCII characters
        run: mise run ascii-check

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    needs: sanitize

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install mise
        uses: jdx/mise-action@v4.0.1

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build/
          key: cmake-${{ runner.os }}-GCC-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.cu', '**/CMakeLists.txt', 'cmake/**') }}
          restore-keys: cmake-${{ runner.os }}-GCC-

      - name: Install system dependencies
        run: mise run deps

      - name: Build
        run: mise run build

      - name: Lint
        run: mise run lint

  spell:
    name: Spell Check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install mise
        uses: jdx/mise-action@v4.0.1

      - name: Check spelling
        run: mise run spell

  coverage:
    name: Coverage
    runs-on: ubuntu-22.04
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install mise
        uses: jdx/mise-action@v4.0.1

      - name: Cache coverage build
        uses: actions/cache@v4
        with:
          path: build-coverage/
          key: cmake-coverage-${{ runner.os }}-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.cu', '**/CMakeLists.txt', 'cmake/**') }}
          restore-keys: cmake-coverage-${{ runner.os }}-

      - name: Install system dependencies
        run: mise run deps

      - name: Run coverage
        run: mise run test:coverage

  cppcheck:
    name: Cppcheck
    runs-on: ubuntu-22.04
    needs: coverage

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install mise
        uses: jdx/mise-action@v4.0.1

      - name: Install cppcheck
        run: sudo apt-get install -y -q cppcheck

      - name: Run cppcheck
        run: mise run cppcheck

  todo:
    name: TODO to Issue
    runs-on: ubuntu-22.04
    needs: cppcheck
    if: github.event_name == 'push'
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Create issues from TODOs
        uses: alstr/todo-to-issue-action@v5.1.14

  links:
    name: Link Check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install mise
        uses: jdx/mise-action@v4.0.1

      - name: Check links
        run: mise run links

  latex:
    name: Build LaTeX Report
    runs-on: ubuntu-24.04
    needs: cppcheck

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install mise
        uses: jdx/mise-action@v4.0.1

      - name: Install tectonic
        uses: wtfjoke/setup-tectonic@v4.0.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build PDF
        run: mise run report:build

      - name: Upload PDF
        uses: actions/upload-artifact@v7.0.1
        with:
          name: report
          path: report/report.pdf
