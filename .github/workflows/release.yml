name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install mise
        uses: jdx/mise-action@v4.0.1

      - name: Install system dependencies
        run: mise run deps

      - name: Build
        run: mise run build

      - name: Package binaries
        run: |
          mkdir -p dist
          cp build/bins/analyzer/analyzer dist/
          cp build/bins/simulator/simulator dist/
          tar -czf vector-field-analysis-${{ github.ref_name }}-linux-x86_64.tar.gz -C dist .

      - name: Create GitHub release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            vector-field-analysis-${{ github.ref_name }}-linux-x86_64.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
