# vortex_128x128.toml
# Small 128×128 test version of the vortex config.
#
# Run: simulator configs/vortex_128x128.toml

[simulation]
steps = 1
dt = 0.01
viscosity = 0.03
width = 128
height = 128
xmin = -1.0
xmax = 1.0
ymin = -1.0
ymax = 1.0

[[layers]]
type = "vortex"
strength = 1.0
magnitude = 0.005

[analyzer]
solver = "sequential"