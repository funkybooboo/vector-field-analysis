# spiral_32x32.toml
# An inward spiral -- vortex rotation blended 70% toward a central sink.
# Viscous decay makes the field fade to zero over time.
#
# Run: simulator configs/spiral_32x32.toml

[simulation]
steps     = 200
dt        = 0.01
viscosity = 0.3
width     = 32
height    = 32
xmin      = -1.0
xmax      =  1.0
ymin      = -1.0
ymax      =  1.0

[[layers]]
type       = "spiral"
sink_blend = 0.7     # 0.0 = pure vortex, 1.0 = pure sink
strength   = 1.0
magnitude  = 1.0     # vector length scale; 1.0 = unit length (default)
