# dual_vortex_64x32.toml
# Two counter-rotating vortices side by side, demonstrating superposition.
# The left vortex spins counter-clockwise (strength +1) and the right
# vortex spins clockwise (strength -1, negating the field direction).
# Viscous decay fades both vortices over time.
#
# Run: simulator configs/dual_vortex_64x32.toml

[simulation]
steps     = 200
dt        = 0.01
viscosity = 0.02
width     = 64
height    = 32
xmin      = -2.0
xmax      =  2.0
ymin      = -1.0
ymax      =  1.0

[[layers]]
type      = "vortex"
center_x  = -0.8
center_y  =  0.0
strength  =  1.0
magnitude =  1.0    # vector length scale; 1.0 = unit length (default)

[[layers]]
type      = "vortex"
center_x  =  0.8
center_y  =  0.0
strength  = -1.0
magnitude =  1.0
