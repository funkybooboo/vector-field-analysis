# vortex_32x32.toml
# A single counter-clockwise vortex centered at the origin.
# Viscous decay causes the field to fade over time, as real vortices do.
#
# Run: simulator configs/vortex_32x32.toml

[simulation]
steps     = 200
dt        = 0.01
viscosity = 0.03
width     = 32
height    = 32
xmin      = -1.0
xmax      =  1.0
ymin      = -1.0
ymax      =  1.0

[[layers]]
type      = "vortex"
strength  = 1.0
magnitude = 1.0    # vector length scale; 1.0 = unit length (default)
