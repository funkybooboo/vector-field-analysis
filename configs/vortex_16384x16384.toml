# vortex_16384x16384.toml
# A single counter-clockwise vortex centered at the origin, 10000×10000 grid.
# Viscous decay causes the field to fade over time, as real vortices do.
#
# Run: simulator configs/vortex_16384x16384.toml

[simulation]
steps = 50
dt = 0.01
viscosity = 0.03
width = 16384
height = 16384
xmin = -1.0
xmax = 1.0
ymin = -1.0
ymax = 1.0

[[layers]]
type = "vortex"
strength = 1.0
magnitude = 1.0 # vector length scale; 1.0 = unit length (default)
