# pulsing_stream_64x64.toml
# A single stream that smoothly turns on and off over time.
# The sin(t) modulation cycles the flow between zero and full strength,
# with a 2*pi period. At dt=0.05, one full pulse takes ~126 steps.
#
# Run: simulator configs/pulsing_stream_64x64.toml

[simulation]
steps     = 200
dt        = 0.05
viscosity = 0.0
width     = 64
height    = 64
xmin      = -2.0
xmax      =  2.0
ymin      = -2.0
ymax      =  2.0

[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "exp(-((y) * (y)) / 0.15) * (0.5 + 0.5 * sin(t))"
y_expression = "0.0"
