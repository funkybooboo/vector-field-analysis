# layered_64x64.toml
# Three layers combined via superposition:
#   1. A central vortex driving rotation
#   2. A source off-center that pushes flow outward from one side
#   3. Low-amplitude noise that adds organic turbulence
#
# Demonstrates how layers compose into a complex field.
#
# Run: simulator configs/layered_64x64.toml

[simulation]
steps     = 150
dt        = 0.01
viscosity = 0.1
width     = 64
height    = 64
xmin      = -1.0
xmax      =  1.0
ymin      = -1.0
ymax      =  1.0

[[layers]]
type     = "vortex"
center_x = 0.0
center_y = 0.0
strength = 1.0

[[layers]]
type     = "source"
center_x = 0.4
center_y = 0.0
strength = 0.5

[[layers]]
type     = "noise"
scale    = 3.0
seed     = 99
strength = 0.2
