# jet_stream_64x64.toml
# A focused high-speed stream with superimposed turbulent noise, modelling
# an atmospheric jet stream. The core flow is a tight Gaussian band;
# the noise layer adds realistic meandering and eddies around it.
#
# Run: simulator configs/jet_stream_64x64.toml

[simulation]
steps     = 100
dt        = 0.05
viscosity = 0.0
width     = 64
height    = 64
xmin      = -2.0
xmax      =  2.0
ymin      = -2.0
ymax      =  2.0

# Core jet: tight band centered slightly above the equator
[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "exp(-((y - 0.3) * (y - 0.3)) / 0.05)"
y_expression = "0.0"

# Turbulent noise
[[layers]]
type     = "noise"
scale    = 3.0
seed     = 42
strength = 0.18
