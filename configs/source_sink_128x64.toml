# source_sink_128x64.toml
# A source on the left and a sink on the right.
# Flow radiates outward from the source, travels across the domain,
# and converges into the sink. A low-amplitude noise layer adds realistic
# turbulent disturbance to the otherwise laminar flow.
# Viscous decay gradually weakens the field over time.
#
# Run: simulator configs/source_sink_128x64.toml

[simulation]
steps     = 100
dt        = 0.05
viscosity = 0.02
width     = 128
height    = 64
xmin      = -2.0
xmax      =  2.0
ymin      = -1.0
ymax      =  1.0

[[layers]]
type      = "source"
center_x  = -1.0
center_y  =  0.0
strength  =  1.0
magnitude =  1.0    # vector length scale; 1.0 = unit length (default)

[[layers]]
type      = "sink"
center_x  =  1.0
center_y  =  0.0
strength  =  1.0
magnitude =  1.0

[[layers]]
type      = "noise"
scale     = 2.0
seed      = 17
strength  = 0.15
magnitude = 1.0
