# vortex_1024x1024.toml
# A single counter-clockwise vortex centered at the origin, 1000×1000 grid.
# Viscous decay causes the field to fade over time, as real vortices do.
#
# Run: simulator configs/vortex_1024x1024.toml

[simulation]
steps = 50
dt = 0.01
viscosity = 0.03
width = 1024
height = 1024
xmin = -1.0
xmax = 1.0
ymin = -1.0
ymax = 1.0

[[layers]]
type = "vortex"
strength = 1.0
magnitude = 1.0 # vector length scale; 1.0 = unit length (default)

[analyzer]
solver = "benchmark"
benchmark_threads = [2, 4, 8]
benchmark_cuda_block_sizes = [64, 128, 256, 512]