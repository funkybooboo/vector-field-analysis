# vortex_1024x1024.toml
# High-resolution 1-million point vector field.
# Optimized for domain decomposition: magnitude is scaled down so that
# each streamline step is unlikely to jump across more than 1-2 grid cells.
#
# Run: simulator configs/vortex_1024x1024.toml

[simulation]
steps = 25
dt = 0.01
viscosity = 0.03
width = 1024
height = 1024
xmin = -1.0
xmax = 1.0
ymin = -1.0
ymax = 1.0
output = "data/vortex_1024x1024/field.h5"

[[layers]]
type = "vortex"
strength = 1.0
magnitude = 0.125 # Scaled down to preserve locality at high resolution
center_x = 0.0
center_y = 0.0
