# different_speeds_64x64.toml
# Three left-to-right streams at the same Gaussian width but different speeds.
# Top stream is fastest (1.0), middle is half speed (0.5), bottom is slowest (0.2).
# The contrast in vector magnitude makes the speed difference immediately visible.
#
# Run: simulator configs/different_speeds_64x64.toml

[simulation]
steps     = 100
dt        = 0.05
viscosity = 0.0
width     = 64
height    = 64
xmin      = -2.0
xmax      =  2.0
ymin      = -2.0
ymax      =  2.0

# Top stream: full speed
[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "exp(-((y - 1.2) * (y - 1.2)) / 0.06)"
y_expression = "0.0"

# Middle stream: half speed
[[layers]]
type         = "custom"
strength     = 0.5
x_expression = "exp(-((y) * (y)) / 0.06)"
y_expression = "0.0"

# Bottom stream: slowest
[[layers]]
type         = "custom"
strength     = 0.2
x_expression = "exp(-((y + 1.2) * (y + 1.2)) / 0.06)"
y_expression = "0.0"
