# drifting_stream_256x256.toml
# A single stream that oscillates vertically over time.
# The Gaussian center follows 0.8*sin(0.4*t), sweeping the stream band
# up and down through the domain while the flow direction stays rightward.
#
# Run: simulator configs/drifting_stream_256x256.toml

[simulation]
steps     = 200
dt        = 0.05
viscosity = 0.0
width     = 256
height    = 256
xmin      = -2.0
xmax      =  2.0
ymin      = -2.0
ymax      =  2.0

[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "exp(-((y - 0.8 * sin(0.4 * t)) * (y - 0.8 * sin(0.4 * t))) / 0.06)"
y_expression = "0.0"
