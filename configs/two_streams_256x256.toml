# two_streams_256x256.toml
# Two distinct left-to-right flows confined to separate horizontal bands.
# Each stream uses a Gaussian envelope in y so that it decays to near-zero
# before reaching the other stream -- the flows are visually clear and do
# not touch. No viscous decay keeps them steady over time.
#
# Run: simulator configs/two_streams_256x256.toml

[simulation]
steps     = 100
dt        = 0.05
viscosity = 0.0
width     = 256
height    = 256
xmin      = -2.0
xmax      =  2.0
ymin      = -2.0
ymax      =  2.0

# Upper stream: centered at y = 0.8
# Gaussian width sigma ~ 0.25; at y=0 (midpoint) value is exp(-10.24) ~ 0
[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "exp(-((y - 0.8) * (y - 0.8)) / 0.06)"
y_expression = "0.0"

# Lower stream: centered at y = -0.8
[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "exp(-((y + 0.8) * (y + 0.8)) / 0.06)"
y_expression = "0.0"
