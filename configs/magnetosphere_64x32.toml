# magnetosphere_64x32.toml
# Earth's magnetosphere interacting with the solar wind.
#
# Viewed in the noon-midnight meridional plane (cross-section through the
# magnetic poles). The Sun is to the left; solar wind flows right.
#
# Earth's dipole field uses two 1/r^2-decaying poles (matching real 2D
# magnetic field decay) rather than the unit-normalized built-in source/sink:
#   North pole (top, y=+0.3): field lines exit
#   South pole (bottom, y=-0.3): field lines enter
#
# The standoff distance where magnetic pressure balances solar wind pressure
# sits at roughly r=1.0 -- visible as the "magnetopause" in the plot.
# On the dayside (left) the field is compressed; on the nightside (right)
# it is swept into the long magnetotail.
#
# The solar wind pulses with sin(0.4*t), simulating solar wind pressure
# variations (e.g. coronal mass ejection passage).
#
# Run: simulator configs/magnetosphere_64x32.toml

[simulation]
steps     = 100
dt        = 0.05
viscosity = 0.0
width     = 64
height    = 32
xmin      = -3.0
xmax      =  3.0
ymin      = -1.5
ymax      =  1.5

[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "1.5 + 0.3 * sin(0.4 * t)"
y_expression = "0.0"

[[layers]]
type         = "custom"
strength     = 1.5
x_expression = "x / (x * x + (y - 0.3) * (y - 0.3) + 0.02)"
y_expression = "(y - 0.3) / (x * x + (y - 0.3) * (y - 0.3) + 0.02)"

[[layers]]
type         = "custom"
strength     = 1.5
x_expression = "-x / (x * x + (y + 0.3) * (y + 0.3) + 0.02)"
y_expression = "-(y + 0.3) / (x * x + (y + 0.3) * (y + 0.3) + 0.02)"

[[layers]]
type     = "noise"
scale    = 2.0
seed     = 5
strength = 0.12
