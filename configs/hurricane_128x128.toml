# hurricane_128x128.toml
# Tropical cyclone (Northern Hemisphere).
#
# Three-layer model:
#   1. Core spiral -- counter-clockwise rotation with inward convergence
#      (sink_blend=0.12 matches the ~10-15 deg inflow angle of real tropical cyclones)
#   2. Rainband turbulence -- Perlin noise representing outer spiral bands
#   3. Environmental steering flow -- weak uniform stream that would move the
#      storm NW as a typical recurving Atlantic hurricane
#
# Viscous decay simulates gradual weakening (e.g. landfall or cooler SSTs).
#
# Run: simulator configs/hurricane_128x128.toml

[simulation]
steps     = 200
dt        = 0.05
viscosity = 0.005
width     = 128
height    = 128
xmin      = -2.0
xmax      =  2.0
ymin      = -2.0
ymax      =  2.0

[[layers]]
type       = "spiral"
sink_blend = 0.12
center_x   = 0.0
center_y   = 0.0
strength   = 3.0

[[layers]]
type     = "noise"
scale    = 2.5
seed     = 37
strength = 0.4

[[layers]]
type      = "uniform"
angle     = 120.0
magnitude = 0.3
strength  = 1.0
