# karman_street_128x64.toml
# Von Karman vortex street -- the alternating vortex pattern that forms
# downstream of any bluff body (cylinder, bridge pier, smokestack, island).
#
# Uses the exact analytical formula for two infinite periodic rows of point
# vortices (Lamb's Hydrodynamics). The rows advect rightward at 0.55 units/s.
#
# For a row of vortices of strength G spaced L apart at height a:
#   u = -(G/2L) * sinh(2pi*(y-a)/L) / (cosh(2pi*(y-a)/L) - cos(2pi*x/L))
#   v = +(G/2L) * sin(2pi*x/L)      / (cosh(2pi*(y-a)/L) - cos(2pi*x/L))
#
# Upper row (CCW, y=+0.28) and lower row (CW, y=-0.28) are offset by L/2=0.5
# -- the classical stable Karman geometry. The implied cylinder is off the
# left edge of the domain.
#
# Run: simulator configs/karman_street_128x64.toml

[simulation]
steps = 50
dt = 0.01
viscosity = 0.03
width = 512
height = 512
xmin = -1.0
xmax = 1.0
ymin = -1.0
ymax = 1.0

[[layers]]
type = "vortex"
strength = 1.0
magnitude = 1.0 # vector length scale; 1.0 = unit length (default)
