# static_128x128.toml
# A completely static zero-velocity field -- nothing going on.
# No flow, no decay, no time variation. Every vector is zero everywhere.
#
# Run: simulator configs/static_128x128.toml

[simulation]
steps     = 1
dt        = 0.0
viscosity = 0.0
width     = 128
height    = 128
xmin      = -1.0
xmax      =  1.0
ymin      = -1.0
ymax      =  1.0

[[layers]]
type      = "uniform"
magnitude = 0.0
strength  = 0.0
