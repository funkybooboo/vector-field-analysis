# kelvin_helmholtz_128x64.toml
# Kelvin-Helmholtz shear instability.
#
# Occurs wherever two fluid layers slide past each other: ocean-atmosphere
# interface, jet stream boundaries, cloud formations, planet atmospheres
# (Jupiter's bands), and inside stars.
#
# Layer 1: base shear flow -- tanh(5*y) gives +1 above and -1 below the
#   interface at y=0, with a smooth transition of thickness ~0.2.
#
# Layer 2: growing perturbation -- a sinusoidal transverse displacement that
#   grows exponentially with time (exp(0.12*t)), mimicking the linear
#   instability growth rate. The wavelength (1.0) is in the unstable band
#   for this shear layer thickness. By the final steps the perturbation is
#   large enough to roll up into billows.
#
# Run: simulator configs/kelvin_helmholtz_128x64.toml

[simulation]
steps     = 100
dt        = 0.10
viscosity = 0.0
width     = 128
height    = 64
xmin      = -2.0
xmax      =  2.0
ymin      = -1.0
ymax      =  1.0

[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "tanh(5 * y)"
y_expression = "0"

[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "0"
y_expression = "0.08 * sin(2 * pi * x) * exp(0.12 * t)"
