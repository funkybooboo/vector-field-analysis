# vortex_8192x8192.toml
#
# Run: simulator configs/vortex_8192x8192.toml

[simulation]
steps = 1
dt = 0.01
viscosity = 0.03
width = 8192
height = 8192
xmin = -1.0
xmax = 1.0
ymin = -1.0
ymax = 1.0

[[layers]]
type = "vortex"
strength = 1.0
magnitude = 0.005

[analyzer]
solver = "benchmark"
benchmark_threads = [2, 4, 8]
benchmark_cuda_block_sizes = [64, 128, 256, 512]
