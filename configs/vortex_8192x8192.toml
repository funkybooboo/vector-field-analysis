# vortex_8192x8192.toml
# Small 100×100 test version of the vortex config.
#
# Run: simulator configs/vortex_8192x8192.toml

[simulation]
steps = 50
dt = 0.01
viscosity = 0.03
width = 8192
height = 8192
xmin = -1.0
xmax = 1.0
ymin = -1.0
ymax = 1.0

[[layers]]
type = "vortex"
strength = 1.0
magnitude = 1.0
