# custom_rotation_128x128.toml
# Solid-body rotation that oscillates in speed over time.
# The cos(0.5 * t) factor causes the rotation to slow, reverse, and spin
# back up -- like a paddle or rotor under a periodic driving force.
#
# The `t` variable equals step * dt (e.g. step 10 at dt=0.05 -> t=0.5).
#
# Run: simulator configs/custom_rotation_128x128.toml

[simulation]
steps     = 200
dt        = 0.05
viscosity = 0.0
width     = 128
height    = 128
xmin      = -1.0
xmax      =  1.0
ymin      = -1.0
ymax      =  1.0

[[layers]]
type         = "custom"
x_expression = "-y * cos(0.5 * t)"
y_expression = "x * cos(0.5 * t)"
strength     = 1.0
