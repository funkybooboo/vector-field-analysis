# multi_flow_2_64x64.toml
# Two uniform streams and two source-sink pairs.
# The streams provide background directional flow while each source-sink
# pair drives a channel of flow across the domain at a different y position.
#
# Run: simulator configs/multi_flow_2_64x64.toml

[simulation]
steps     = 100
dt        = 0.05
viscosity = 0.01
width     = 64
height    = 64
xmin      = -2.0
xmax      =  2.0
ymin      = -2.0
ymax      =  2.0

# Stream 1: rightward flow
[[layers]]
type      = "uniform"
angle     = 0.0
magnitude = 1.0
strength  = 0.3

# Stream 2: diagonal flow (upper-right)
[[layers]]
type      = "uniform"
angle     = 45.0
magnitude = 1.0
strength  = 0.2

# Source-sink pair 1 (upper channel)
[[layers]]
type     = "source"
center_x = -1.5
center_y =  0.7
strength =  1.0

[[layers]]
type     = "sink"
center_x =  1.5
center_y =  0.7
strength =  1.0

# Source-sink pair 2 (lower channel)
[[layers]]
type     = "source"
center_x = -1.5
center_y = -0.7
strength =  1.0

[[layers]]
type     = "sink"
center_x =  1.5
center_y = -0.7
strength =  1.0
