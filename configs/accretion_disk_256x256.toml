# accretion_disk_256x256.toml
# Black hole / neutron star accretion disk.
#
# Combines two effects:
#   1. Keplerian rotation -- orbital speed proportional to 1/sqrt(r),
#      the velocity profile of matter in stable orbit around a compact object.
#      In Cartesian: vx = -y/r^1.5, vy = x/r^1.5  where r^1.5 = (x^2+y^2)^0.75
#   2. Radial infall -- matter spiraling inward at ~20% of orbital speed,
#      driven by viscosity and angular momentum transport (magneto-rotational
#      instability in real disks).
#
# The combined field: vx = (-y - 0.2*x) / r^1.5, vy = (x - 0.2*y) / r^1.5
# A small epsilon in r^2 regularizes the central singularity (the event horizon
# or stellar surface is not resolved here).
#
# The noise layer approximates MRI-driven turbulence in the disk midplane.
#
# Run: simulator configs/accretion_disk_256x256.toml

[simulation]
steps     = 100
dt        = 0.05
viscosity = 0.0
width     = 256
height    = 256
xmin      = -1.5
xmax      =  1.5
ymin      = -1.5
ymax      =  1.5

[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "(-y - 0.2 * x) / exp(0.75 * log(x * x + y * y + 0.01))"
y_expression = "(x - 0.2 * y) / exp(0.75 * log(x * x + y * y + 0.01))"

[[layers]]
type     = "noise"
scale    = 4.0
seed     = 13
strength = 0.2
