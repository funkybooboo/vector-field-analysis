# karman_street_65536x65536.toml
# Small 100×100 test version of the Kármán vortex street config.
#
# Run: simulator configs/karman_street_65536x65536.toml

[simulation]
steps = 120
dt = 0.05
viscosity = 0.0
width = 65536
height = 65536
xmin = -2.0
xmax = 2.0
ymin = -1.0
ymax = 1.0

[[layers]]
type = "uniform"
angle = 0.0
magnitude = 0.3
strength = 1.0

[[layers]]
type = "custom"
strength = 0.8
x_expression = "-0.5 * sinh(2 * pi * (y - 0.28)) / (cosh(2 * pi * (y - 0.28)) - cos(2 * pi * (x - 0.55 * t)) + 0.08)"
y_expression = "0.5 * sin(2 * pi * (x - 0.55 * t)) / (cosh(2 * pi * (y - 0.28)) - cos(2 * pi * (x - 0.55 * t)) + 0.08)"

[[layers]]
type = "custom"
strength = 0.8
x_expression = "0.5 * sinh(2 * pi * (y + 0.28)) / (cosh(2 * pi * (y + 0.28)) - cos(2 * pi * (x - 0.55 * t + 0.5)) + 0.08)"
y_expression = "-0.5 * sin(2 * pi * (x - 0.55 * t + 0.5)) / (cosh(2 * pi * (y + 0.28)) - cos(2 * pi * (x - 0.55 * t + 0.5)) + 0.08)"

[analyzer]
solver = "cuda"
