# crossing_streams_128x128.toml
# A horizontal left-to-right stream crosses a vertical bottom-to-top stream.
# Each is Gaussian-confined to its axis. They intersect at the origin,
# creating an interference region where both flows superpose.
#
# Run: simulator configs/crossing_streams_128x128.toml

[simulation]
steps     = 100
dt        = 0.05
viscosity = 0.0
width     = 128
height    = 128
xmin      = -2.0
xmax      =  2.0
ymin      = -2.0
ymax      =  2.0

# Horizontal stream: flows right, confined to y = 0
[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "exp(-((y) * (y)) / 0.06)"
y_expression = "0.0"

# Vertical stream: flows upward, confined to x = 0
[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "0.0"
y_expression = "exp(-((x) * (x)) / 0.06)"
