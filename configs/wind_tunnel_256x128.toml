# wind_tunnel_256x128.toml
# Potential flow around a circular cylinder -- a classic wind tunnel result.
#
# The free stream oscillates gently with sin(0.3 * t), simulating a periodic
# gust. The doublet layer stays fixed, so the cylinder boundary (r = 0.3) holds
# its shape while the upstream flow breathes in and out around it.
#
# Inside the cylinder (r < 0.3) the doublet dominates and vectors point
# backward -- this makes the solid body visible in the plot.
#
# Run: simulator configs/wind_tunnel_256x128.toml

[simulation]
steps     = 100
dt        = 0.05
viscosity = 0.0
width     = 256
height    = 128
xmin      = -2.0
xmax      =  2.0
ymin      = -1.0
ymax      =  1.0

# Free stream: uniform flow in +x that pulses with time
[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "1.0 + 0.3 * sin(0.3 * t)"
y_expression = "0.0"

# Doublet at origin (strength = R^2 = 0.09, R = 0.3).
# Combined with the free stream layer this gives potential flow around a
# cylinder of radius 0.3. A small epsilon is added to r^2 to avoid
# division by zero at the origin.
[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "-0.09 * (x * x - y * y) / ((x * x + y * y + 0.001) * (x * x + y * y + 0.001))"
y_expression = "-0.18 * x * y / ((x * x + y * y + 0.001) * (x * x + y * y + 0.001))"
