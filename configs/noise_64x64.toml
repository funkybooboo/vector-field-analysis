# noise_64x64.toml
# Pure Perlin noise field -- no symmetry, organic-looking flow.
# Good for stress-testing the analyzer with irregular input.
# Change `seed` to get a different noise pattern.
#
# Run: simulator configs/noise_64x64.toml

[simulation]
steps     = 50
dt        = 0.05
viscosity = 0.0
width     = 64
height    = 64
xmin      = -1.0
xmax      =  1.0
ymin      = -1.0
ymax      =  1.0

[[layers]]
type      = "noise"
scale     = 2.5     # higher = more turbulent
seed      = 7
strength  = 1.0
magnitude = 1.0     # vector length scale; 1.0 = unit length (default)
