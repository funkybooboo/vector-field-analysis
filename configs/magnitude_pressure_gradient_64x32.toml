# magnitude_pressure_gradient_64x32.toml
# Three sources arranged left to right with increasing magnitudes.
# Each source pushes flow radially outward, but the rightmost source
# is 5x stronger per-vector than the leftmost. This creates an
# asymmetric domain where flow is dominated by the high-magnitude
# source even though all three share the same strength weight.
#
# Sources (left to right):
#   x=-1.5  magnitude=0.5   (weak)
#   x= 0.0  magnitude=1.25  (medium)
#   x= 1.5  magnitude=2.5   (strong)
#
# Run: simulator configs/magnitude_pressure_gradient_64x32.toml

[simulation]
steps     = 100
dt        = 0.01
viscosity = 0.0
width     = 64
height    = 32
xmin      = -2.5
xmax      =  2.5
ymin      = -1.0
ymax      =  1.0

[[layers]]
type      = "source"
center_x  = -1.5
center_y  =  0.0
strength  =  1.0
magnitude =  0.5    # weak outward push

[[layers]]
type      = "source"
center_x  =  0.0
center_y  =  0.0
strength  =  1.0
magnitude =  1.25   # medium outward push

[[layers]]
type      = "source"
center_x  =  1.5
center_y  =  0.0
strength  =  1.0
magnitude =  2.5    # strong outward push
