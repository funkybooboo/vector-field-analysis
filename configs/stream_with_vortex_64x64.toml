# stream_with_vortex_64x64.toml
# Two left-to-right streams with a vortex sitting at the boundary between them.
# The vortex stirs the interface, deflecting both streams and creating a visible
# mixing region. Vectors near the vortex core spiral outward into both bands.
#
# Run: simulator configs/stream_with_vortex_64x64.toml

[simulation]
steps     = 100
dt        = 0.05
viscosity = 0.01
width     = 64
height    = 64
xmin      = -2.0
xmax      =  2.0
ymin      = -2.0
ymax      =  2.0

# Upper stream
[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "exp(-((y - 0.9) * (y - 0.9)) / 0.06)"
y_expression = "0.0"

# Lower stream
[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "exp(-((y + 0.9) * (y + 0.9)) / 0.06)"
y_expression = "0.0"

# Vortex at the interface
[[layers]]
type     = "vortex"
center_x =  0.0
center_y =  0.0
strength =  0.6
