# magnitude_structure_over_noise_32x32.toml
# A strong spiral overlaid with gentle turbulent noise.
# magnitude is used to set the physical scale of each layer independently
# of strength (the superposition weight). The spiral produces long vectors
# at magnitude=1.8, while the noise layer is kept subtle at magnitude=0.2
# so it perturbs without overwhelming the primary structure.
#
# This pattern -- high-magnitude structure + low-magnitude noise -- is a
# useful idiom for adding realistic irregularity to an otherwise clean field.
#
# Run: simulator configs/magnitude_structure_over_noise_32x32.toml

[simulation]
steps     = 200
dt        = 0.02
viscosity = 0.01
width     = 32
height    = 32
xmin      = -1.0
xmax      =  1.0
ymin      = -1.0
ymax      =  1.0

[[layers]]
type       = "spiral"
sink_blend = 0.2     # mostly rotation, slight inward pull
center_x   = 0.0
center_y   = 0.0
strength   = 1.0
magnitude  = 1.8     # dominant -- long vectors define the structure

[[layers]]
type      = "noise"
scale     = 3.0
seed      = 42
strength  = 1.0
magnitude = 0.2      # subtle -- just enough to roughen the spiral edges
