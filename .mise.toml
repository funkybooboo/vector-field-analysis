[tools]
cmake = "4.2.3"
ninja = "1.13.2"
uv = "0.11.2"
"pipx:clang-format" = "22.1.3"
"github:lycheeverse/lychee" = "0.15.1"
"aqua:koalaman/shellcheck" = "0.11.0"
"aqua:mvdan/sh" = "3.11.0"

# =============================================================================
# Setup
# =============================================================================

[tasks.deps]
description = "Install system dependencies (HDF5, OpenMPI, cppcheck, CUDA)"
run = """
if command -v apt-get &>/dev/null; then
    # Pinned versions (Ubuntu 22.04 jammy):
    #   libhdf5-dev          1.10.7+repack-4ubuntu2
    #   libopenmpi-dev       4.1.2-2ubuntu1
    #   openmpi-bin          4.1.2-2ubuntu1
    #   cppcheck             2.7-1
    #   nvidia-cuda-toolkit  11.5.1-1ubuntu1
    sudo apt-get update -q && sudo apt-get install -y -q \
        "libhdf5-dev=1.10.7+repack-4ubuntu2" \
        "libopenmpi-dev=4.1.2-2ubuntu1" \
        "openmpi-bin=4.1.2-2ubuntu1" \
        "cppcheck=2.7-1" \
        "nvidia-cuda-toolkit=11.5.1-1ubuntu1" \
        clang-tidy
elif command -v dnf &>/dev/null; then
    # Tested: hdf5-1.14, openmpi-5.0, cppcheck-2.13, cuda-toolkit-12
    sudo dnf update -q && sudo dnf install -y -q hdf5 openmpi-devel cppcheck cuda-toolkit clang-tools-extra
elif command -v pacman &>/dev/null; then
    # Tested: hdf5-1.14, openmpi-5.0, cppcheck-2.14, cuda-12
    sudo pacman -S --needed hdf5 openmpi cppcheck cuda clang
else
    echo "Unsupported package manager -> install HDF5, OpenMPI, cppcheck, and CUDA Toolkit manually"
    exit 1
fi
"""

# =============================================================================
# Build
# =============================================================================

[tasks.configure]
description = "Configure CMake build"
run = "make configure"

[tasks.build]
description = "Build everything"
run = "make build"

[tasks."build:analyzer"]
description = "Build analyzer"
run = "make build-analyzer"

[tasks."build:simulator"]
description = "Build simulator"
run = "make build-simulator"

[tasks."build:sanitize"]
description = "Build with AddressSanitizer + UBSanitizer"
run = "make build-sanitize"

[tasks."build:coverage"]
description = "Build with coverage instrumentation"
run = "make build-coverage"

# =============================================================================
# Test
# =============================================================================

[tasks.test]
description = "Run all tests"
depends = ["build"]
run = "ctest --test-dir build --output-on-failure"

[tasks."test:vector"]
description = "Run vector library tests"
run = "make test-vector"

[tasks."test:analyzer"]
description = "Run analyzer tests"
run = "make test-analyzer"

[tasks."test:simulator"]
description = "Run simulator tests"
run = "make test-simulator"

[tasks."test:sanitize"]
description = "Test with AddressSanitizer + UBSanitizer"
run = "make test-sanitize"

[tasks."test:coverage"]
description = "Run tests and generate coverage report"
run = """
make test-coverage
uvx gcovr -r . build-coverage/ \
  --filter 'bins/.*' \
  --filter 'libs/.*' \
  --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
  --print-summary
mkdir -p coverage
uvx gcovr -r . build-coverage/ \
  --filter 'bins/.*' \
  --filter 'libs/.*' \
  --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
  --html-details coverage/index.html
"""

[tasks."coverage:open"]
description = "Open the HTML coverage report in the default browser"
run = "xdg-open coverage/index.html"

# =============================================================================
# Run
# =============================================================================

[tasks."run:simulator"]
description = "Build and run the simulator"
run = "make run-simulator"

[tasks."run:analyzer"]
description = "Generate field data then benchmark all analyzer impls (MPI_RANKS, ANALYZER_THREADS)"
run = "make run-analyzer"

[tasks."run:analyzer:mpi"]
description = "Run MPI analyzer (MPI_RANKS defaults to nproc)"
run = "make run-analyzer"

[tasks."run:configs"]
description = "Run all configs via scripts/pipeline.sh"
run = "./scripts/pipeline.sh"

[tasks.demo]
description = "Full pipeline for one config stem: build, simulate, analyze, stats, visualize (STEM, MPI_RANKS)"
run = "./scripts/local/pipeline.sh ${STEM:-vortex_128x128}"

# =============================================================================
# Visualize / Stats
# =============================================================================

[tasks.visualize]
description = "Visualize field.h5 with quiver plot"
run = "uv run tools/visualize.py data/${STEM:-vortex_128x128}/field.h5"

[tasks."visualize:streams"]
description = "Visualize field.h5 with streamlines overlaid"
run = "uv run tools/visualize.py data/${STEM:-vortex_128x128}/field.h5 --streams data/${STEM:-vortex_128x128}/streams.h5"

[tasks.stats]
description = "Print stats for field.h5 and field.streams.h5"
run = "uv run tools/stats.py data/${STEM:-vortex_128x128}/field.h5 data/${STEM:-vortex_128x128}/streams.h5"

[tasks."stats:field"]
description = "Print stats for field.h5"
run = "uv run tools/stats.py data/${STEM:-vortex_128x128}/field.h5"

[tasks."stats:streams"]
description = "Print stats for field.streams.h5"
run = "uv run tools/stats.py data/${STEM:-vortex_128x128}/streams.h5"

# =============================================================================
# Quality
# =============================================================================

[tasks.format]
description = "Format all source files in place"
run = "find bins libs -name '*.cpp' -o -name '*.hpp' -o -name '*.cu' | xargs clang-format -i"

[tasks."format:check"]
description = "Check formatting without modifying files"
run = "find bins libs -name '*.cpp' -o -name '*.hpp' -o -name '*.cu' | xargs clang-format --dry-run --Werror"

[tasks."ascii-check"]
description = "Fail if any source file contains non-ASCII characters"
run = """
if LC_ALL=C grep -rn --include='*.cpp' --include='*.hpp' --include='*.toml' --include='*.cmake' --include='*.txt' --include='*.sh' --include='*.py' -P '[\x80-\xFF]' bins libs cmake docs scripts CMakeLists.txt .clang-tidy .clang-format; then
    echo "Non-ASCII characters found."
    exit 1
fi
"""

[tasks.lint]
description = "Run clang-tidy on all source files"
depends = ["build"]
run = "find bins libs -name '*.cpp' | xargs clang-tidy -p build --config-file=.clang-tidy --warnings-as-errors=*"

[tasks.spell]
description = "Check for spelling errors"
run = "uvx codespell bins libs docs tools README.md --skip='build,*.h5'"

[tasks."py:lint"]
description = "Lint Python tools with ruff"
run = "uvx ruff check tools/"

[tasks."py:format:check"]
description = "Check Python formatting with ruff"
run = "uvx ruff format --check tools/"

[tasks."sh:lint"]
description = "Lint shell scripts with shellcheck"
run = "find scripts report -name '*.sh' | xargs shellcheck -x"

[tasks."sh:format"]
description = "Format shell scripts with shfmt in place"
run = "find scripts report -name '*.sh' | xargs shfmt -w"

[tasks."sh:format:check"]
description = "Check shell script formatting with shfmt"
run = "find scripts report -name '*.sh' | xargs shfmt -d"

[tasks.cppcheck]
description = "Run cppcheck static analysis"
run = """
cppcheck --enable=all --error-exitcode=1 \
  --suppress=missingIncludeSystem \
  --suppress=missingInclude \
  --suppress=unmatchedSuppression \
  --suppress=normalCheckLevelMaxBranches \
  "--suppress=unusedStructMember:bins/simulator/src/fieldGenerator.cpp" \
  "--suppress=knownConditionTrueFalse:bins/analyzer/src/main.cpp" \
  "--suppress=unusedFunction:libs/field/src/grid.hpp" \
  bins/ libs/
# unusedStructMember: false positive -- RadialComponents members accessed via std::optional::operator->
# normalCheckLevelMaxBranches: pthreads.cpp two-pass design exceeds branch analysis limit, not an error
# knownConditionTrueFalse: intentional #ifdef USE_MPI pattern; always 0/1 in non-MPI build
# unusedFunction grid.hpp: bounds/field/setPrecomputedStreamlines used in .cu files cppcheck does not analyze
"""

[tasks.links]
description = "Check for broken links in markdown files"
run = """
lychee --verbose --no-progress --exclude math.nist.gov README.md docs/ tools/ .github/
# math.nist.gov/oommf: upstream server returns 404 (not our problem)
"""

# =============================================================================
# Report
# =============================================================================

[tasks."report:build"]
description = "Build the LaTeX report PDF"
run = "make -C report"

[tasks."report:open"]
description = "Open the report PDF in the default viewer"
run = "xdg-open report/report.pdf"

[tasks."report:clean"]
description = "Clean LaTeX report build artifacts"
run = "make -C report clean"

# =============================================================================
# CI
# =============================================================================

[tasks.ci]
description = "Full CI pipeline"
depends = [
  "format:check",
  "ascii-check",
  "spell",
  "links",
  "report:build",
  "test",
  "test:sanitize",
  "lint",
  "test:coverage",
  "cppcheck",
  "py:lint",
  "py:format:check",
  "sh:lint",
  "sh:format:check",
]

# =============================================================================
# Clean
# =============================================================================

[tasks."clean:build"]
description = "Remove main build directory"
run = "make clean-build"

[tasks."clean:sanitize"]
description = "Remove sanitizer build directory"
run = "make clean-sanitize"

[tasks."clean:coverage"]
description = "Remove coverage build directory and data"
run = "make clean-coverage"

[tasks."clean:data"]
description = "Remove simulator output data"
run = "make clean-data"

[tasks.clean]
description = "Remove all build artifacts"
depends = ["report:clean"]
run = "make clean"
