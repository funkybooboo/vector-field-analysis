[tools]
cmake = "latest"
ninja = "latest"
uv = "latest"
"pipx:clang-format" = "22.1.1"
"pipx:clang-tidy" = "22.1.0"
"ubi:lycheeverse/lychee" = "latest"

[tasks.deps]
description = "Install system dependencies (HDF5, cppcheck; clang-format/tidy/lychee/uv managed by mise)"
run = """
if command -v apt-get &>/dev/null; then
    sudo apt-get update -q && sudo apt-get install -y -q libhdf5-dev cppcheck
elif command -v pacman &>/dev/null; then
    sudo pacman -S --needed hdf5 cppcheck
else
    echo "Unsupported package manager -> install HDF5 and cppcheck manually"
    exit 1
fi
"""

[tasks.configure]
description = "Configure CMake build"
run = "cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5"

[tasks.build]
description = "Build everything"
depends = ["configure"]
run = "cmake --build build"

[tasks."build:lib:vector"]
description = "Build vector library"
depends = ["configure"]
run = "cmake --build build --target vector"

[tasks."build:bin:analyzer"]
description = "Build analyzer"
depends = ["configure"]
run = "cmake --build build --target analyzer"

[tasks."build:bin:simulator"]
description = "Build simulator"
depends = ["configure"]
run = "cmake --build build --target simulator"

[tasks.test]
description = "Run all tests"
depends = ["build"]
run = "ctest --test-dir build --output-on-failure"

[tasks."test:lib:vector"]
description = "Run vector library tests"
depends = ["build"]
run = "ctest --test-dir build --output-on-failure -R vector"

[tasks."test:bin:analyzer"]
description = "Run analyzer tests"
depends = ["build"]
run = "ctest --test-dir build --output-on-failure -R analyzer"

[tasks."test:bin:simulator"]
description = "Run simulator tests"
depends = ["build"]
run = "ctest --test-dir build --output-on-failure -R simulator"

[tasks."run:bin:simulator"]
description = "Build and run the simulator"
depends = ["build:bin:simulator"]
run = "./build/bins/simulator/simulator bins/simulator/configs/karman_street.toml"

[tasks."run:bin:analyzer"]
description = "Build and run the analyzer"
depends = ["build:bin:analyzer"]
run = "./build/bins/analyzer/analyzer"

[tasks.visualize]
description = "Visualize field.h5 with the quiver plot tool"
run = "uv run tools/visualize.py field.h5"

[tasks.format]
description = "Format all source files in place"
run = "find bins libs -name '*.cpp' -o -name '*.hpp' | xargs clang-format -i"

[tasks."format:check"]
description = "Check formatting without modifying files"
run = "find bins libs -name '*.cpp' -o -name '*.hpp' | xargs clang-format --dry-run --Werror"

[tasks."ascii-check"]
description = "Fail if any project source file contains non-ASCII characters"
run = """
if grep -rn --include='*.cpp' --include='*.hpp' --include='*.toml' --include='*.cmake' --include='*.txt' -P '[\x80-\xFF]' bins libs cmake docs CMakeLists.txt .clang-tidy .clang-format; then
    echo "Non-ASCII characters found in project files."
    exit 1
fi
echo "All project files are ASCII-only."
"""

[tasks.lint]
description = "Run clang-tidy on all source files"
depends = ["configure"]
run = "find bins libs -name '*.cpp' | xargs clang-tidy -p build --config-file=.clang-tidy --warnings-as-errors=*"

[tasks."configure:sanitize"]
description = "Configure CMake build with AddressSanitizer + UBSanitizer"
run = """
cmake -B build-sanitize -G Ninja \
  -DCMAKE_BUILD_TYPE=Debug \
  -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
  -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
  '-DCMAKE_CXX_FLAGS=-fsanitize=address,undefined -fno-omit-frame-pointer' \
  '-DCMAKE_EXE_LINKER_FLAGS=-fsanitize=address,undefined'
"""

[tasks."build:sanitize"]
description = "Build with AddressSanitizer + UBSanitizer"
depends = ["configure:sanitize"]
run = "cmake --build build-sanitize"

[tasks."test:sanitize"]
description = "Run tests under AddressSanitizer + UBSanitizer"
depends = ["build:sanitize"]
run = "ASAN_OPTIONS=detect_leaks=1 UBSAN_OPTIONS=print_stacktrace=1 ctest --test-dir build-sanitize --output-on-failure"

[tasks.spell]
description = "Check source files and docs for spelling errors"
run = "uvx codespell bins libs docs tools README.md --skip='build,*.h5'"

[tasks."configure:coverage"]
description = "Configure CMake build with gcov coverage instrumentation"
run = """
cmake -B build-coverage -G Ninja \
  -DCMAKE_BUILD_TYPE=Debug \
  -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
  -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
  '-DCMAKE_CXX_FLAGS=--coverage' \
  '-DCMAKE_EXE_LINKER_FLAGS=--coverage'
"""

[tasks."build:coverage"]
description = "Build with coverage instrumentation"
depends = ["configure:coverage"]
run = "cmake --build build-coverage"

[tasks."test:coverage"]
description = "Run tests and generate coverage report"
depends = ["build:coverage"]
run = """
ctest --test-dir build-coverage --output-on-failure
uvx gcovr -r . build-coverage/ \
  --filter 'bins/.*' \
  --filter 'libs/.*' \
  --print-summary
"""

[tasks.cppcheck]
description = "Run cppcheck static analysis on all source files"
run = """
cppcheck --enable=all --error-exitcode=1 \
  --suppress=missingIncludeSystem \
  --suppress=missingInclude \
  --suppress=unmatchedSuppression \
  bins/ libs/
"""

[tasks.links]
description = "Check for broken links in markdown files"
run = "lychee --verbose --no-progress README.md docs/ tools/ .github/"

[tasks.ci]
description = "Run full CI pipeline (mirrors GitHub Actions)"
depends = [
  "format:check",
  "ascii-check",
  "spell",
  "cppcheck",
  "links",
  "test",
  "lint",
  "test:coverage",
]

[tasks.clean]
description = "Remove build artifacts"
run = "rm -rf build build-sanitize build-coverage coverage.info"
