[tools]
cmake = "latest"
ninja = "latest"

[tasks.deps]
description = "Install system dependencies"
run = """
if command -v apt-get &>/dev/null; then
    sudo apt-get update -q
    sudo apt-get install -y -q wget gnupg lsb-release libhdf5-dev
    wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
    sudo bash /tmp/llvm.sh 22
    sudo apt-get install -y clang-format-22 clang-tidy-22
    sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-22 100
    sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-22 100
elif command -v pacman &>/dev/null; then
    sudo pacman -S --needed hdf5 clang clang-tools-extra
else
    echo "Unsupported package manager -> install HDF5, clang-format 22, and clang-tidy 22 manually"
    exit 1
fi
"""

[tasks.configure]
description = "Configure CMake build"
run = "cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5"

[tasks.build]
description = "Build everything"
depends = ["configure"]
run = "cmake --build build"

[tasks."build:lib:vector"]
description = "Build vector library"
depends = ["configure"]
run = "cmake --build build --target vector"

[tasks."build:bin:analyzer"]
description = "Build analyzer"
depends = ["configure"]
run = "cmake --build build --target analyzer"

[tasks."build:bin:simulator"]
description = "Build simulator"
depends = ["configure"]
run = "cmake --build build --target simulator"

[tasks.test]
description = "Run all tests"
depends = ["build"]
run = "ctest --test-dir build --output-on-failure"

[tasks."test:lib:vector"]
description = "Run vector library tests"
depends = ["build"]
run = "ctest --test-dir build --output-on-failure -R vector"

[tasks."test:bin:analyzer"]
description = "Run analyzer tests"
depends = ["build"]
run = "ctest --test-dir build --output-on-failure -R analyzer"

[tasks."test:bin:simulator"]
description = "Run simulator tests"
depends = ["build"]
run = "ctest --test-dir build --output-on-failure -R simulator"

[tasks."run:bin:simulator"]
description = "Build and run the simulator"
depends = ["build:bin:simulator"]
run = "./build/bins/simulator/simulator"

[tasks."run:bin:analyzer"]
description = "Build and run the analyzer"
depends = ["build:bin:analyzer"]
run = "./build/bins/analyzer/analyzer"

[tasks.format]
description = "Format all source files in place"
run = "find bins libs -name '*.cpp' -o -name '*.h' | xargs clang-format -i"

[tasks."format:check"]
description = "Check formatting without modifying files"
run = "find bins libs -name '*.cpp' -o -name '*.h' | xargs clang-format --dry-run --Werror"

[tasks.lint]
description = "Run clang-tidy on all source files"
depends = ["configure"]
run = "find bins libs -name '*.cpp' | xargs clang-tidy -p build --config-file=.clang-tidy --warnings-as-errors=*"

[tasks.ci]
description = "Run full CI pipeline: format check, build, test, lint"
depends = ["format:check", "build"]
run = [
    "ctest --test-dir build --output-on-failure",
    "find bins libs -name '*.cpp' | xargs clang-tidy -p build --config-file=.clang-tidy --warnings-as-errors=*",
]

[tasks.clean]
description = "Remove build artifacts"
run = "rm -rf build"
