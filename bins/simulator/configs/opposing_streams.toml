# opposing_streams.toml
# Two streams flowing in opposite directions -- upper flows right, lower flows left.
# A clear shear layer forms at the interface (y=0) where the two flows meet.
# This is the setup that, with a perturbation, leads to Kelvin-Helmholtz instability.
#
# Run: simulator bins/simulator/configs/opposing_streams.toml

[simulation]
steps     = 100
dt        = 0.05
viscosity = 0.0
output    = "field.h5"
width     = 128
height    = 128
xmin      = -2.0
xmax      =  2.0
ymin      = -2.0
ymax      =  2.0

# Upper stream: rightward
[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "exp(-((y - 0.7) * (y - 0.7)) / 0.06)"
y_expression = "0.0"

# Lower stream: leftward (negative x)
[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "-exp(-((y + 0.7) * (y + 0.7)) / 0.06)"
y_expression = "0.0"
