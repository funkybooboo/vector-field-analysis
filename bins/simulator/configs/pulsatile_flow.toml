# pulsatile_flow.toml
# Pulsatile blood flow in a large artery (e.g. coronary or aorta).
#
# Layer 1: pulsatile Poiseuille profile -- the exact laminar solution for
#   oscillating pressure-driven flow in a channel. The parabolic profile
#   (1 - y^2) satisfies the no-slip condition at the walls (y = +/-1).
#   The amplitude (0.6 + 0.8*sin(1.2*t)) represents one cardiac cycle:
#     - Peak systole: amplitude 1.4  (forward flow)
#     - Mid-diastole: amplitude 0.6  (slow forward flow)
#     - End-diastole: amplitude -0.2 (brief flow reversal -- physiologically
#       normal in coronary arteries where diastole drives most perfusion)
#   Frequency 1.2 rad/s ~ 72 bpm resting heart rate.
#
# Layer 2: secondary oscillatory mixing -- transverse motion that peaks
#   off-axis and reverses with each cycle, representing secondary flows
#   (Dean vortices in curved arteries, oscillatory boundary layer effects).
#
# Run: simulator bins/simulator/configs/pulsatile_flow.toml

[simulation]
steps     = 120
dt        = 0.05
viscosity = 0.0
output    = "field.h5"
width     = 128
height    = 64
xmin      = -3.0
xmax      =  3.0
ymin      = -1.0
ymax      =  1.0

[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "(1.0 - y * y) * (0.6 + 0.8 * sin(1.2 * t))"
y_expression = "0.0"

[[layers]]
type         = "custom"
strength     = 0.5
x_expression = "0.0"
y_expression = "y * (1.0 - y * y) * 0.3 * cos(1.2 * t)"
