# magnitude_contrast.toml
# Two identical vortices side by side with very different vector lengths.
# Both have the same type, center positions, and strength=1.0 -- the only
# difference is magnitude. The right vortex produces vectors 4x longer than
# the left, which is clearly visible in a quiver plot.
#
# Left  vortex: magnitude=0.5  (half unit length)
# Right vortex: magnitude=2.0  (double unit length)
#
# Run: simulator bins/simulator/configs/magnitude_contrast.toml

[simulation]
steps     = 100
dt        = 0.01
viscosity = 0.0
output    = "field.h5"
width     = 128
height    = 64
xmin      = -2.0
xmax      =  2.0
ymin      = -1.0
ymax      =  1.0

[[layers]]
type      = "vortex"
center_x  = -1.0
center_y  =  0.0
strength  =  1.0
magnitude =  0.5    # short vectors -- half unit length

[[layers]]
type      = "vortex"
center_x  =  1.0
center_y  =  0.0
strength  =  1.0
magnitude =  2.0    # long vectors -- double unit length
