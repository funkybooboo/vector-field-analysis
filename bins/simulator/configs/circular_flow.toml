# circular_flow.toml
# Flow confined to a ring of radius 1.0, with vectors tangent to the circle.
# A Gaussian envelope in the radial direction concentrates the flow on the
# ring -- inside and outside it the field falls to near-zero.
# The result is a circular conveyor belt of flow.
#
# Run: simulator bins/simulator/configs/circular_flow.toml

[simulation]
steps     = 100
dt        = 0.05
viscosity = 0.0
output    = "field.h5"
width     = 128
height    = 128
xmin      = -2.0
xmax      =  2.0
ymin      = -2.0
ymax      =  2.0

[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "-(y / (sqrt(x*x + y*y) + 0.001)) * exp(-((sqrt(x*x + y*y) - 1.0) * (sqrt(x*x + y*y) - 1.0)) / 0.04)"
y_expression = " (x / (sqrt(x*x + y*y) + 0.001)) * exp(-((sqrt(x*x + y*y) - 1.0) * (sqrt(x*x + y*y) - 1.0)) / 0.04)"
