# four_streams.toml
# Four distinct left-to-right flows confined to separate horizontal bands.
# Streams are evenly spaced at y = -1.5, -0.5, +0.5, +1.5. The Gaussian
# width is tightened (0.04) to keep neighbors non-touching at spacing of 1.0.
# At each midpoint (0.5 units away), value is exp(-6.25) ~ 0.002.
#
# Run: simulator bins/simulator/configs/four_streams.toml

[simulation]
steps     = 100
dt        = 0.05
viscosity = 0.0
output    = "field.h5"
width     = 128
height    = 128
xmin      = -2.0
xmax      =  2.0
ymin      = -2.0
ymax      =  2.0

# Stream 1: centered at y = 1.5
[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "exp(-((y - 1.5) * (y - 1.5)) / 0.04)"
y_expression = "0.0"

# Stream 2: centered at y = 0.5
[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "exp(-((y - 0.5) * (y - 0.5)) / 0.04)"
y_expression = "0.0"

# Stream 3: centered at y = -0.5
[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "exp(-((y + 0.5) * (y + 0.5)) / 0.04)"
y_expression = "0.0"

# Stream 4: centered at y = -1.5
[[layers]]
type         = "custom"
strength     = 1.0
x_expression = "exp(-((y + 1.5) * (y + 1.5)) / 0.04)"
y_expression = "0.0"
