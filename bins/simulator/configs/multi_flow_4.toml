# multi_flow_4.toml
# Four uniform streams and four source-sink pairs.
# Streams at four angles create a richly superposed background field,
# while four source-sink pairs drive parallel flow channels evenly
# distributed across the vertical extent of the domain.
#
# Run: simulator bins/simulator/configs/multi_flow_4.toml

[simulation]
steps     = 100
dt        = 0.05
viscosity = 0.01
output    = "field.h5"
width     = 128
height    = 128
xmin      = -2.0
xmax      =  2.0
ymin      = -2.0
ymax      =  2.0

# Stream 1: rightward
[[layers]]
type      = "uniform"
angle     = 0.0
magnitude = 1.0
strength  = 0.2

# Stream 2: upper-right
[[layers]]
type      = "uniform"
angle     = 45.0
magnitude = 1.0
strength  = 0.2

# Stream 3: upper-left
[[layers]]
type      = "uniform"
angle     = 135.0
magnitude = 1.0
strength  = 0.15

# Stream 4: downward
[[layers]]
type      = "uniform"
angle     = 270.0
magnitude = 1.0
strength  = 0.15

# Source-sink pair 1 (top channel)
[[layers]]
type     = "source"
center_x = -1.5
center_y =  1.5
strength =  1.0

[[layers]]
type     = "sink"
center_x =  1.5
center_y =  1.5
strength =  1.0

# Source-sink pair 2 (upper-middle channel)
[[layers]]
type     = "source"
center_x = -1.5
center_y =  0.5
strength =  1.0

[[layers]]
type     = "sink"
center_x =  1.5
center_y =  0.5
strength =  1.0

# Source-sink pair 3 (lower-middle channel)
[[layers]]
type     = "source"
center_x = -1.5
center_y = -0.5
strength =  1.0

[[layers]]
type     = "sink"
center_x =  1.5
center_y = -0.5
strength =  1.0

# Source-sink pair 4 (bottom channel)
[[layers]]
type     = "source"
center_x = -1.5
center_y = -1.5
strength =  1.0

[[layers]]
type     = "sink"
center_x =  1.5
center_y = -1.5
strength =  1.0
